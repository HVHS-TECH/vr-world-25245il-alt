<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky src="Background.jpg"
      ></a-sky>
    <a-plane position="0 -2 0" 
         rotation="-90 0 0" 
         width="100" 
         height="100" 
         color="#012909">
    </a-plane>  
    
      <a-entity 
      ply-model="src:Big Tree.ply"
      position="5 -8 -22"
      rotation="-90 270 90"
      ></a-entity>
      <script>
AFRAME.registerComponent('circle-motion', {
  schema: {
    radius: {type: 'number', default: 5},
    speed: {type: 'number', default: 1}
  },
  tick: function (time, timeDelta) {
    const angle = (time / 1000) * this.data.speed;
    const x = Math.cos(angle) * this.data.radius;
    const z = Math.sin(angle) * this.data.radius - 10; // keep it in front
    this.el.setAttribute('position', {x: x, y: 0, z: z});
  }
});
</script>
    <a-box position="5 0 0" color="red"
  animation="property: rotation;
             to: 0 360 0;
             dur: 5000;
             easing: linear;
             loop: true">
</a-box>
        
    </a-scene>
  </body>
</html>
