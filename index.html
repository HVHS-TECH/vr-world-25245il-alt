<!DOCTYPE html>
<html>
  <head>

<script src="https://aframe.io/releases/1.1.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@2.1.1/dist/aframe-extras.min.js"></script>
    
  </head>
    <body>
    <a-scene>
      <a-sky src="Background.jpg"
      ></a-sky>
    <a-plane position="0 -2 0" 
         rotation="-90 0 0" 
         width="100" 
         height="100" 
         color="#7BC8A4">
    </a-plane>  
       <!-- Put this inside the <a-scene> -->
      <a-entity 
      ply-model="src:Big Tree.ply"
      position="5 -8 -22"
      rotation="-90 270 90"
      ></a-entity>
      <a-entity 
      ply-model="src:Owl.ply"
      position="0 0 -10"
      rotation="-90 270 90"
      animation="
      property:position;
      from:0 0 -10;
      to:-7 0 -10;
      dur:2000;
      loop:true;
      dir:alternate;"
      ></a-entity>
                 
    </a-scene>
  </body>
</html>
